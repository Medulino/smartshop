name: Test Gemini desde US
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Probar modelos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          for MODELO in gemini-2.5-flash-lite gemini-2.5-flash gemini-3-flash-preview gemini-robotics-er-1.6-preview; do
            echo "=== $MODELO ==="
            curl -s "https://generativelanguage.googleapis.com/v1beta/models/$MODELO:generateContent?key=$GEMINI_API_KEY" \
              -H 'Content-Type: application/json' \
              -d '{"contents":[{"parts":[{"text":"Di hola"}]}]}' | head -c 500
            echo ""
          done